---
# ============================================================
#  FAILBACK: Restaurar enlace principal
#  Se ejecuta cuando Zabbix confirma restauración del enlace
# ============================================================
- name: "FAILBACK — Restaurar ruta principal"
  hosts: router1
  gather_facts: no
  connection: network_cli

  vars:
    primary_gw: "{{ primary_gateway | default('10.0.1.2') }}"
    backup_gw: "{{ backup_gateway | default('10.0.2.2') }}"

  tasks:
    - name: "Mostrar estado actual de rutas"
      cisco.ios.ios_command:
        commands:
          - show ip route static
      register: rutas_antes
      tags: [verify]

    - name: "INFO — Rutas antes del cambio"
      debug:
        msg: "{{ rutas_antes.stdout_lines }}"
      tags: [verify]

    - name: "Eliminar ruta de respaldo y restaurar ruta principal"
      cisco.ios.ios_config:
        lines:
          - "no ip route 0.0.0.0 0.0.0.0 {{ backup_gw }}"
          - "ip route 0.0.0.0 0.0.0.0 {{ primary_gw }}"
        save_when: modified
      tags: [failback]

    - name: "Verificar nuevas rutas"
      cisco.ios.ios_command:
        commands:
          - show ip route static
      register: rutas_despues
      tags: [verify]

    - name: "INFO — Rutas después del cambio"
      debug:
        msg: "{{ rutas_despues.stdout_lines }}"
      tags: [verify]

    - name: "Verificar conectividad por enlace principal"
      cisco.ios.ios_command:
        commands:
          - "ping {{ primary_gw }} repeat 3"
      register: ping_result
      ignore_errors: yes
      tags: [verify]

    - name: "Resultado del ping de verificación"
      debug:
        msg: "{{ ping_result.stdout_lines }}"
      tags: [verify]
